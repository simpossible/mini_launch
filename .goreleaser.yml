version: 2

builds:
  - main: .
    binary: mini_launch
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/simpossible/mini_launch/cmd.version={{.Version}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "checksums.txt"

nfpms:
  - id: mini_launch
    package_name: mini_launch
    file_name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    homepage: "https://github.com/simpossible/mini_launch"
    description: "A simple cross-platform service daemon manager for macOS and Linux"
    maintainer: "simpossible"
    license: "MIT"
    formats:
      - deb
      - rpm
    section: "utils"
    priority: "optional"

brews:
  - name: mini_launch
    repository:
      owner: simpossible
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/simpossible/mini_launch"
    description: "A simple cross-platform service daemon manager for macOS and Linux"
    test: |
      system "#{bin}/mini_launch", "--help"
